name: Agent Implement
run-name: "agent-impl issue #${{ github.event.issue.number }}"

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  id-token: write

concurrency:
  group: >-
    agent-impl-${{ github.event.issue.number }}
    -${{ contains(github.event.comment.body, '[review]') && 'review' || 'implement' }}
    -${{ github.event.comment.user.type == 'Bot' && 'bot' || 'user' }}
  cancel-in-progress: true

jobs:
  impl:
    if: |
      github.event.comment.user.type != 'Bot' &&
      (contains(github.event.comment.body, '@claude') || contains(github.event.comment.body, '@codex')) &&
      !contains(github.event.comment.body, '[review]') &&
      !contains(github.event.comment.body, '[plan]') &&
      !contains(github.event.comment.body, '[breakdown]')
    runs-on: ubuntu-latest
    steps:
      # ローカル action を読むために checkout は必要
      # ここではデフォルトブランチを取る（issue起点 implement はエージェント側がブランチ作成する想定）
      - name: Checkout repository to access local actions
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare context
        id: prep
        uses: Javakky/claude-starter/.github/actions/prepare-claude-context@master
        with:
          mode: "implement"
          impl_workflow_id: agent.yml # ←この workflow ファイル名に合わせる（ファイル名変えるならここも変える）

      # PR上のメンション(implement)であれば、そのPRの review を止めたい（任意）
      - name: Cancel running reviews for this PR
        if: steps.prep.outputs.should_run == 'true' && steps.prep.outputs.pr_number != ''
        uses: Javakky/claude-starter/.github/actions/cancel-claude-runs@master
        with:
          workflow_id: agent-review.yml
          pr_number: ${{ steps.prep.outputs.pr_number }}
          head_ref: ${{ steps.prep.outputs.head_ref }}
          head_sha: ${{ steps.prep.outputs.head_sha }}

      # PR conversation から呼ばれた場合だけ、そのブランチへ checkout し直す
      - name: Checkout PR head branch (PR conversation only)
        if: steps.prep.outputs.should_run == 'true' && steps.prep.outputs.pr_number != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prep.outputs.head_ref }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Run Agent (implement)
        if: steps.prep.outputs.should_run == 'true'
        uses: Javakky/claude-starter/.github/actions/run-claude@master
        with:
          # Issue起点でもPR起点でも、メンションを含む本文がそのままエージェントに渡る
          github_token: ${{ github.token }}
          comment_body: ${{ steps.prep.outputs.comment_body }}
          mention_type: ${{ steps.prep.outputs.mention_type }}
          issue_number: ${{ steps.prep.outputs.issue_number }}
          pr_number: ${{ steps.prep.outputs.pr_number }}
          head_ref: ${{ steps.prep.outputs.head_ref }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          codex_code_oauth_token: ${{ secrets.CODEX_CODE_OAUTH_TOKEN }}
          codex_auth_json: ${{ secrets.CODEX_AUTH_JSON }}
          codex_github_token: ${{ secrets.CODEX_GITHUB_TOKEN }}
          codex_app_id: ${{ secrets.CODEX_APP_ID }}
          codex_app_private_key: ${{ secrets.CODEX_APP_PRIVATE_KEY }}
          default_model: 'opus'
          default_max_turns: '1000'
          # allowed_tools: |
          #   Bash(npm run lint)
          #   Bash(npm run test)

