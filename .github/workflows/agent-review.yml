name: Agent Review
run-name: "agent-review pr #${{ github.event.pull_request.number || github.event.issue.number }}"

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write
  id-token: write

concurrency:
  group: >-
    agent-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
    -${{ github.event_name == 'pull_request' && 'pr' || 'comment' }}
    -${{ github.event_name == 'issue_comment' && (github.event.comment.user.type == 'Bot' && 'bot' || 'user') || 'na' }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # ローカル actions を使うための checkout
      - name: Checkout repository to access local actions
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare context
        id: prep
        uses: Javakky/claude-starter/.github/actions/prepare-claude-context@master
        with:
          mode: "review"
          # implement-running gate 用（implement workflow ファイル名に合わせる）
          impl_workflow_id: agent.yml

          # pr-sync skip rules
          skip_commit_prefixes: "docs:,style:,chore:,wip:"
          allow_final_sync_during_impl: "true"
          # senderがBotじゃないケースに備えるなら marker を入れる（運用でエージェント最終commitに付ける）
          final_sync_commit_marker: "[agent-final]"

          allowed_comment_permissions: "admin,maintain,write"
          max_workflow_runs_to_scan: "50"

      # prepare が skip の場合はここで終了
      - name: Stop early if skipped
        if: steps.prep.outputs.should_run != 'true'
        run: |
          echo "Skipping review: ${{ steps.prep.outputs.reason }}"

      # Review は PR context が必須（pull_request or PR conversation comment）
      - name: Fail fast if PR context missing
        if: steps.prep.outputs.should_run == 'true' && steps.prep.outputs.pr_number == ''
        run: |
          echo "PR context is required for review but pr_number is empty."
          exit 1

      # レビュー対象の head_sha/head_ref を checkout（正しい差分をレビューするため）
      - name: Checkout PR head
        if: steps.prep.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prep.outputs.head_sha }}
          fetch-depth: 0

      - name: Run Agent Review
        if: steps.prep.outputs.should_run == 'true'
        uses: Javakky/claude-starter/.github/actions/run-claude-review@master
        with:
          github_token: ${{ github.token }}
          comment_body: ${{ steps.prep.outputs.comment_body }}
          # mention_type: 空または auto でエージェント選択、トークンなしでフォールバック
          mention_type: ${{ steps.prep.outputs.mention_type }}
          issue_number: ${{ steps.prep.outputs.issue_number }}
          pr_number: ${{ steps.prep.outputs.pr_number }}
          head_ref: ${{ steps.prep.outputs.head_ref }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          codex_code_oauth_token: ${{ secrets.CODEX_CODE_OAUTH_TOKEN }}
          codex_auth_json: ${{ secrets.CODEX_AUTH_JSON }}
          codex_github_token: ${{ secrets.CODEX_GITHUB_TOKEN }}
          model: 'opus'
          max_turns: '30'
          # prompt: '/review'

